version: "3"
services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    command: ["openclaw", "gateway", "run", "--bind", "lan", "--port", "18789", "--allow-unconfigured", "--auth", "token", "--token", "greffon"]
    ports:
      - "18789:18789"
    volumes:
      - openclaw_data:/home/node/.openclaw
    environment:
      NODE_ENV: production

volumes:
  openclaw_data:
