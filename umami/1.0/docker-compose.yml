version: "3"
services:
  umami:
    image: ghcr.io/umami-software/umami:3.1.0
    restart: on-failure
    ports:
      - "3000:3000"
    depends_on:
      - umami_db
    environment:
      # Umami v3 is Postgres-only (no SQLite). Connection string points at the
      # internal db service; password keyed off instance_id (unique per deploy;
      # app + db share the rendered value, no cross-instance reuse).
      DATABASE_TYPE: "postgresql"
      DATABASE_URL: "postgresql://umami:{{ instance_id }}@umami_db:5432/umami"
      # Signs auth tokens / session. Platform-generated.
      APP_SECRET: ""
    # NOTE: no SMTP — Umami has no built-in email. First login uses the
    # bootstrapped admin (admin / umami); ⚠️ change it immediately. There is no
    # env var to set a generated initial password, so the change-on-first-login
    # step is the mitigation (documented in metadata description).

  umami_db:
    image: postgres:16-alpine
    restart: on-failure
    environment:
      POSTGRES_DB: "umami"
      POSTGRES_USER: "umami"
      POSTGRES_PASSWORD: "{{ instance_id }}"
    # Phase 3 hot DB backup hooks (read by the greffer as SERVICE -> container
    # labels). dump: pg_dump custom format to stdout; restore: pg_restore from
    # stdin, --clean --if-exists so a re-restore drops+recreates objects. Both run
    # as the local superuser over the unix socket (trust auth -> no password).
    labels:
      com.greffon.backup.dump: "pg_dump -U umami -d umami -Fc"
      com.greffon.backup.restore: "pg_restore -U umami -d umami --clean --if-exists --no-owner"
    # Required by the greffer's hot DB restore (_wait_db_healthy): the restore
    # waits for this healthcheck to pass before streaming pg_restore in.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - umami_db_data:/var/lib/postgresql/data

volumes:
  umami_db_data:
