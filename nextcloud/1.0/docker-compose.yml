version: "3"
services:
  nextcloud:
    image: nextcloud:latest
    ports:
      - "8080:80"
    depends_on:
      - nextcloud_db
    environment:
      POSTGRES_HOST: nextcloud_db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # SMTP — values rendered from the operator's SMTP integration at deploy
      # time. The Nextcloud image's smtp.config.php only activates the mail
      # setup when SMTP_HOST + MAIL_FROM_ADDRESS + MAIL_DOMAIN are all set,
      # so `from_address` is split by '@' into the local part and the domain.
      # Greffer removes these keys entirely when no SMTP integration is selected.
      SMTP_HOST: "{{ smtp.host }}"
      SMTP_PORT: "{{ smtp.port }}"
      SMTP_NAME: "{{ smtp.username }}"
      SMTP_PASSWORD: "{{ smtp.password }}"
      # Outer YAML single-quoted, inner Jinja double-quoted — see the
      # equivalent comment in plausible/1.0/docker-compose.yml.
      # yaml.dump would escape inner single quotes as '' and break
      # Jinja parsing on the round-trip through the greffer.
      MAIL_FROM_ADDRESS: '{{ smtp.from_address.split("@")[0] }}'
      MAIL_DOMAIN: '{{ smtp.from_address.split("@")[1] }}'
      SMTP_SECURE: '{{ {"tls": "ssl", "starttls": "tls", "none": ""}[smtp.tls_mode] }}'
    volumes:
      - nextcloud_data:/var/www/html

  nextcloud_db:
    image: postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextcloud
    # Phase 3 hot DB backup hooks (SERVICE -> container labels read by the
    # greffer). The DATA volume (nextcloud_data, the files) is captured by a
    # live restic snapshot; this DB volume is captured by the dump hook instead
    # (multi-artifact backup). dump: pg_dump custom format to stdout; restore:
    # pg_restore from stdin, --clean --if-exists so a re-restore drops+recreates
    # objects, --single-transaction so a failed restore aborts atomically.
    # POSTGRES_USER is unset here so the superuser is `postgres`; both run over
    # the unix socket (trust auth -> no password).
    labels:
      com.greffon.backup.dump: "pg_dump -U postgres -d nextcloud -Fc"
      com.greffon.backup.restore: "pg_restore -U postgres -d nextcloud --clean --if-exists --no-owner --single-transaction"
    volumes:
      - db_data:/var/lib/postgresql/data
    # Required by the greffer's hot DB restore: _wait_db_healthy waits for this
    # healthcheck to pass before streaming pg_restore in.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nextcloud_data:
  db_data:
