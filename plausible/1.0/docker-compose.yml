version: "3"
services:
  plausible:
    image: plausible/analytics:latest
    restart: on-failure
    ports:
      - "8000:8000"
    command: >
      sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      - plausible_db
      - plausible_events_db
    environment:
      DATABASE_URL: postgres://postgres:postgres@plausible_db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events_db
      # Allow first user to self-register via the web UI (Plausible CE v2+
      # removed the ADMIN_USER_* env-var provisioning path).
      DISABLE_REGISTRATION: "false"

  plausible_db:
    image: postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plausible
    volumes:
      - db_data:/var/lib/postgresql/data

  plausible_events_db:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: plausible_events_db
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - event_data:/var/lib/clickhouse

volumes:
  db_data:
  event_data:
