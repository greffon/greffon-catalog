version: "3"
services:
  grafana:
    image: grafana/grafana:12.2.1
    restart: on-failure
    # The image runs as UID 472, but the greffer creates named volumes
    # root-owned, so Grafana can't write /var/lib/grafana and fails to start.
    # Run as root so it owns its data volume (matches Vikunja's handling).
    user: "0"
    ports:
      - "3000:3000"
    environment:
      # External URL so generated links + OAuth redirects resolve behind the
      # greffer proxy.
      GF_SERVER_ROOT_URL: "{{ instance_url }}"
      # Initial admin password the user logs in with (user-chosen, not auto-
      # generated — see metadata). User logs in as 'admin'.
      GF_SECURITY_ADMIN_PASSWORD: ""
      # Key-encryption key for stored data-source credentials. Unset, Grafana
      # falls back to a PUBLIC hardcoded default, so anyone with the volume can
      # decrypt secrets. Platform-generated (greffon-secret) → unique per
      # instance. This is internal crypto (auto-gen is correct), NOT a login.
      GF_SECURITY_SECRET_KEY: ""
      # SMTP — rendered from the operator's SMTP integration at deploy time.
      # The greffer strips every one of these keys when no integration is
      # selected, so an unconfigured instance has alerting email disabled.
      # ENABLED keys off smtp.host so it's only true when configured.
      GF_SMTP_ENABLED: '{{ "true" if smtp.host else "false" }}'
      GF_SMTP_HOST: '{{ smtp.host }}:{{ smtp.port }}'
      GF_SMTP_USER: "{{ smtp.username }}"
      GF_SMTP_PASSWORD: "{{ smtp.password }}"
      GF_SMTP_FROM_ADDRESS: "{{ smtp.from_address }}"
      # Grafana STARTTLS policy maps each integration tls_mode distinctly:
      #   starttls -> MandatoryStartTLS (require STARTTLS upgrade)
      #   none     -> NoStartTLS        (true plaintext; never upgrade, even if
      #                                  the relay advertises STARTTLS)
      #   tls      -> NoStartTLS too — implicit TLS (465) is negotiated via the
      #              port, and STARTTLS must NOT also be attempted on that path.
      GF_SMTP_STARTTLS_POLICY: '{{ "MandatoryStartTLS" if smtp.tls_mode == "starttls" else "NoStartTLS" }}'
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  grafana_data:
