version: "3"
services:
  # Multica WEB frontend — the browser-facing service the greffon proxy fronts.
  # NOTE: a Multica deployment also has a local *agent daemon* that the user
  # runs on their own machine (next to their code + coding-agent CLIs) and
  # points at this server. This greffon hosts the SERVER (web + API + DB); the
  # daemon stays local by design. See the description in metadata.json.
  multica:
    image: ghcr.io/multica-ai/multica-web:v0.3.13
    restart: on-failure
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      HOSTNAME: "0.0.0.0"

  # Service is named literally `backend` ON PURPOSE: the web frontend proxies
  # /api/* to a HARDCODED host `backend:8080` (no env override). The greffer
  # renders service names verbatim but strips custom networks/aliases, so a
  # network alias wouldn't survive — naming the service `backend` is the only
  # thing that makes the hostname resolve through the platform.
  backend:
    image: ghcr.io/multica-ai/multica-backend:v0.3.13
    restart: on-failure
    depends_on:
      - multica_db
    environment:
      PORT: "8080"
      # Per-instance DB password (instance_id unique per deploy; app + db share it).
      DATABASE_URL: "postgres://multica:{{ instance_id }}@multica_db:5432/multica?sslmode=disable"
      # Signs auth tokens. Platform-generated; default upstream is the literal
      # "change-me-in-production", which must never ship.
      JWT_SECRET: ""
      # Public + app URLs so generated links / CORS resolve behind the proxy.
      MULTICA_PUBLIC_URL: "{{ instance_url }}"
      MULTICA_APP_URL: "{{ instance_url }}"
      FRONTEND_ORIGIN: "{{ instance_url }}"
      CORS_ALLOWED_ORIGINS: "{{ instance_url }}"

  multica_db:
    image: pgvector/pgvector:pg17
    restart: on-failure
    environment:
      POSTGRES_DB: "multica"
      POSTGRES_USER: "multica"
      POSTGRES_PASSWORD: "{{ instance_id }}"
    volumes:
      - multica_db_data:/var/lib/postgresql/data

volumes:
  multica_db_data:
