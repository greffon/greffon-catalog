version: "3"
services:
  vikunja:
    image: vikunja/vikunja:latest
    restart: on-failure
    # The image defaults to uid 1000, but the greffer creates named volumes
    # root-owned, so Vikunja can't write /app/vikunja/files (storage init
    # fails: "permission denied [process uid=1000, dir owner uid=0]") and
    # crash-loops. Run as root so it owns its volumes — matches how the
    # other catalog entries on root-owned volumes behave.
    user: "0:0"
    ports:
      - "3456:3456"
    environment:
      # Public URL — Vikunja's frontend (bundled in the same container since
      # v0.23) calls the API at this base; must match the browser-facing URL.
      VIKUNJA_SERVICE_PUBLICURL: "{{ instance_url }}"
      # SQLite out of the box — no separate DB service needed.
      VIKUNJA_DATABASE_TYPE: "sqlite"
      VIKUNJA_DATABASE_PATH: "/db/vikunja.db"
      # Signs auth tokens (user-configurable secret below). NOTE: the var is
      # VIKUNJA_SERVICE_SECRET — VIKUNJA_SERVICE_JWTSECRET is deprecated.
      VIKUNJA_SERVICE_SECRET: ""
      # SMTP — rendered from the operator's SMTP integration at deploy time.
      # The greffer strips every one of these keys when no integration is
      # selected, so an unconfigured instance has the mailer off (and Vikunja
      # then auto-enables new users + disables password reset, the documented
      # no-mailer behaviour). ENABLED keys off smtp.host so it's only "true"
      # when an integration is linked. Vikunja has only a 2-state transport:
      # FORCESSL=true → implicit TLS (SMTPS), false → opportunistic STARTTLS.
      # There is NO true plaintext mode, so the integration's tls_mode "none"
      # maps to FORCESSL=false (STARTTLS) — the closest Vikunja supports. A
      # relay that advertises STARTTLS but can't complete it (e.g. self-signed)
      # would fail; such a relay isn't usable with Vikunja regardless. tls →
      # true (SMTPS); starttls and none → false (STARTTLS).
      VIKUNJA_MAILER_ENABLED: '{{ "true" if smtp.host else "false" }}'
      VIKUNJA_MAILER_HOST: "{{ smtp.host }}"
      VIKUNJA_MAILER_PORT: "{{ smtp.port }}"
      VIKUNJA_MAILER_USERNAME: "{{ smtp.username }}"
      VIKUNJA_MAILER_PASSWORD: "{{ smtp.password }}"
      VIKUNJA_MAILER_FROMEMAIL: "{{ smtp.from_address }}"
      VIKUNJA_MAILER_FORCESSL: '{{ "true" if smtp.tls_mode == "tls" else "false" }}'
    volumes:
      - vikunja_files:/app/vikunja/files
      - vikunja_db:/db

volumes:
  vikunja_files:
  vikunja_db:
