version: "3"
services:
  glitchtip_migrate:
    image: glitchtip/glitchtip:latest
    command: ./manage.py migrate --noinput
    depends_on:
      - glitchtip_db
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip

  # One-shot: create the first superuser so the greffon is usable
  # immediately after install. Retries because compose v3 depends_on
  # only waits for container start, not for postgres to accept conns.
  glitchtip_seed:
    image: glitchtip/glitchtip:latest
    restart: "no"
    depends_on:
      - glitchtip_db
      - glitchtip_migrate
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
    command: >
      sh -c "for i in 1 2 3 4 5 6; do ./manage.py createsuperuser --noinput && break || sleep 5; done; exit 0"

  glitchtip:
    image: glitchtip/glitchtip:latest
    ports:
      - "8000:8000"
    depends_on:
      - glitchtip_migrate
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      # SMTP — values rendered from the operator's SMTP integration at deploy
      # time. Django's EMAIL_URL (dj-email-url format) encodes host, port,
      # username, password, AND TLS mode in one string. Greffer removes this
      # key entirely when no SMTP integration is selected.
      EMAIL_URL: "smtp{{ 's' if smtp.tls_mode == 'tls' else '' }}://{{ smtp.username | urlencode }}:{{ smtp.password | urlencode }}@{{ smtp.host }}:{{ smtp.port }}{% if smtp.tls_mode == 'starttls' %}?tls=True{% endif %}"

  glitchtip_worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      - glitchtip_migrate
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      # Same SMTP config as the web service — worker sends mail too.
      # Kept as literal duplicate (YAML anchors are not portable across all
      # docker-compose versions we target).
      EMAIL_URL: "smtp{{ 's' if smtp.tls_mode == 'tls' else '' }}://{{ smtp.username | urlencode }}:{{ smtp.password | urlencode }}@{{ smtp.host }}:{{ smtp.port }}{% if smtp.tls_mode == 'starttls' %}?tls=True{% endif %}"

  glitchtip_db:
    image: postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: glitchtip
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:latest

volumes:
  db_data:
