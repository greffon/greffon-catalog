version: "3"
services:
  glitchtip_migrate:
    image: glitchtip/glitchtip:latest
    command: ./manage.py migrate --noinput
    depends_on:
      - glitchtip_db
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip

  # One-shot: create the first superuser so the greffon is usable
  # immediately. DJANGO_SUPERUSER_* come from metadata configurations.
  # If the user already exists the command is a no-op (manage.py
  # createsuperuser --noinput returns 1 in that case; we swallow it).
  glitchtip_seed:
    image: glitchtip/glitchtip:latest
    restart: "no"
    depends_on:
      - glitchtip_migrate
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
    command: >
      sh -c "./manage.py createsuperuser --noinput || true"

  glitchtip:
    image: glitchtip/glitchtip:latest
    ports:
      - "8000:8000"
    depends_on:
      - glitchtip_migrate
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
      REDIS_URL: redis://redis:6379/0

  glitchtip_worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      - glitchtip_migrate
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
      REDIS_URL: redis://redis:6379/0

  glitchtip_db:
    image: postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: glitchtip
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:latest

volumes:
  db_data:
