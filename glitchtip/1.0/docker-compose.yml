version: "3"
services:
  glitchtip_migrate:
    image: glitchtip/glitchtip:latest
    command: ./manage.py migrate --noinput
    labels:
      # One-shot: runs migrations then exits. Excluded from instance status so
      # its terminal `exited` state isn't read as a stopped container (which
      # would force the instance to the `unknow` status the manager rejects).
      com.greffon.status: "ignore"
    depends_on:
      glitchtip_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip

  # One-shot: create the first superuser so the greffon is usable immediately
  # after install. Waits (via depends_on conditions) for postgres to be healthy
  # and for the migrate job to finish creating the schema, so createsuperuser
  # never races ahead of the tables. `|| true` keeps a re-up idempotent once the
  # admin user already exists.
  glitchtip_seed:
    image: glitchtip/glitchtip:latest
    restart: "no"
    labels:
      # One-shot: seeds the admin user then exits. Excluded from instance status.
      com.greffon.status: "ignore"
    depends_on:
      glitchtip_db:
        condition: service_healthy
      glitchtip_migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
    command: sh -c "./manage.py createsuperuser --noinput || true; exit 0"

  glitchtip:
    image: glitchtip/glitchtip:latest
    ports:
      - "8000:8000"
    depends_on:
      glitchtip_db:
        condition: service_healthy
      glitchtip_migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      # SMTP. Values rendered from the operator's SMTP integration at deploy
      # time. EMAIL_URL encodes host, port, username, password, AND TLS mode in
      # one string. Greffer removes this key entirely when no SMTP integration
      # is selected.
      #
      # GlitchTip parses EMAIL_URL via django-environ (env.email_url), which
      # derives TLS ONLY from the URL scheme suffix. Query params (?tls / ?ssl)
      # are ignored for TLS (they land in OPTIONS), so TLS mode MUST be encoded
      # in the scheme:
      #   starttls (587) -> smtp+tls:// (EMAIL_USE_TLS)
      #   tls      (465) -> smtp+ssl:// (EMAIL_USE_SSL, implicit TLS)
      #   none           -> smtp://     (plaintext)
      EMAIL_URL: 'smtp{% if smtp.tls_mode == "starttls" %}+tls{% elif smtp.tls_mode == "tls" %}+ssl{% endif %}://{{ smtp.username | urlencode }}:{{ smtp.password | urlencode }}@{{ smtp.host }}:{{ smtp.port }}'

  glitchtip_worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      glitchtip_db:
        condition: service_healthy
      glitchtip_migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      # Same SMTP config as the web service (worker sends mail too). Kept as a
      # literal duplicate (YAML anchors are not portable across all
      # docker-compose versions we target); keep the TLS scheme in sync.
      EMAIL_URL: 'smtp{% if smtp.tls_mode == "starttls" %}+tls{% elif smtp.tls_mode == "tls" %}+ssl{% endif %}://{{ smtp.username | urlencode }}:{{ smtp.password | urlencode }}@{{ smtp.host }}:{{ smtp.port }}'

  glitchtip_db:
    image: postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: glitchtip
    # Phase 3 hot DB backup hooks (SERVICE -> container labels read by the
    # greffer; POSTGRES_USER is unset here so the superuser is `postgres`).
    # dump: pg_dump custom format to stdout; restore: pg_restore from stdin,
    # --clean --if-exists so a re-restore drops+recreates objects,
    # --single-transaction so a failed restore aborts atomically. Both run as
    # the local superuser over the unix socket (trust auth -> no password).
    labels:
      com.greffon.backup.dump: "pg_dump -U postgres -d glitchtip -Fc"
      com.greffon.backup.restore: "pg_restore -U postgres -d glitchtip --clean --if-exists --no-owner --single-transaction"
    volumes:
      - db_data:/var/lib/postgresql/data
    # Required by the greffer's hot DB restore (_wait_db_healthy waits for this
    # to pass before streaming pg_restore in). Already present pre-Phase-3.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d glitchtip"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:latest

volumes:
  db_data:
