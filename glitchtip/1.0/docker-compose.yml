version: "3"
services:
  glitchtip_migrate:
    image: glitchtip/glitchtip:latest
    command: ./manage.py migrate --noinput
    depends_on:
      - glitchtip_db
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip

  # One-shot: create the first superuser so the greffon is usable
  # immediately after install. Retries because compose v3 depends_on
  # only waits for container start, not for postgres to accept conns.
  glitchtip_seed:
    image: glitchtip/glitchtip:latest
    restart: "no"
    depends_on:
      - glitchtip_db
      - glitchtip_migrate
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
    command: >
      sh -c "for i in 1 2 3 4 5 6; do ./manage.py createsuperuser --noinput && break || sleep 5; done; exit 0"

  glitchtip:
    image: glitchtip/glitchtip:latest
    ports:
      - "8000:8000"
    depends_on:
      - glitchtip_migrate
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      # SMTP. Values rendered from the operator's SMTP integration at deploy
      # time. EMAIL_URL encodes host, port, username, password, AND TLS mode in
      # one string. Greffer removes this key entirely when no SMTP integration
      # is selected.
      #
      # GlitchTip parses EMAIL_URL via django-environ (env.email_url), which
      # derives TLS ONLY from the URL scheme suffix. Query params (?tls / ?ssl)
      # are ignored for TLS (they land in OPTIONS), so TLS mode MUST be encoded
      # in the scheme:
      #   starttls (587) -> smtp+tls:// (EMAIL_USE_TLS)
      #   tls      (465) -> smtp+ssl:// (EMAIL_USE_SSL, implicit TLS)
      #   none           -> smtp://     (plaintext)
      EMAIL_URL: 'smtp{% if smtp.tls_mode == "starttls" %}+tls{% elif smtp.tls_mode == "tls" %}+ssl{% endif %}://{{ smtp.username | urlencode }}:{{ smtp.password | urlencode }}@{{ smtp.host }}:{{ smtp.port }}'

  glitchtip_worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      - glitchtip_migrate
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      # Same SMTP config as the web service (worker sends mail too). Kept as a
      # literal duplicate (YAML anchors are not portable across all
      # docker-compose versions we target); keep the TLS scheme in sync.
      EMAIL_URL: 'smtp{% if smtp.tls_mode == "starttls" %}+tls{% elif smtp.tls_mode == "tls" %}+ssl{% endif %}://{{ smtp.username | urlencode }}:{{ smtp.password | urlencode }}@{{ smtp.host }}:{{ smtp.port }}'

  glitchtip_db:
    image: postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: glitchtip
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:latest

volumes:
  db_data:
