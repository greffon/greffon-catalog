version: "3"
services:
  glitchtip_migrate:
    image: glitchtip/glitchtip:latest
    command: ./manage.py migrate --noinput
    labels:
      # One-shot: runs migrations then exits. Excluded from instance status so
      # its terminal `exited` state isn't read as a stopped container (which
      # would force the instance to the `unknow` status the manager rejects).
      com.greffon.status: "ignore"
    depends_on:
      glitchtip_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip

  # One-shot: create the first superuser so the greffon is usable immediately
  # after install. Waits (via depends_on conditions) for postgres to be healthy
  # and for the migrate job to finish creating the schema, so createsuperuser
  # never races ahead of the tables. `|| true` keeps a re-up idempotent once the
  # admin user already exists.
  glitchtip_seed:
    image: glitchtip/glitchtip:latest
    restart: "no"
    labels:
      # One-shot: seeds the admin user then exits. Excluded from instance status.
      com.greffon.status: "ignore"
    depends_on:
      glitchtip_db:
        condition: service_healthy
      glitchtip_migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
    command: sh -c "./manage.py createsuperuser --noinput || true; exit 0"

  glitchtip:
    image: glitchtip/glitchtip:latest
    ports:
      - "8000:8000"
    depends_on:
      glitchtip_db:
        condition: service_healthy
      glitchtip_migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      # SMTP — values rendered from the operator's SMTP integration at deploy
      # time. Django's EMAIL_URL (dj-email-url format) encodes host, port,
      # username, password, AND TLS mode in one string. Greffer removes this
      # key entirely when no SMTP integration is selected.
      EMAIL_URL: 'smtp{{ "s" if smtp.tls_mode == "tls" else "" }}://{{ smtp.username | urlencode }}:{{ smtp.password | urlencode }}@{{ smtp.host }}:{{ smtp.port }}{% if smtp.tls_mode == "starttls" %}?tls=True{% endif %}'

  glitchtip_worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      glitchtip_db:
        condition: service_healthy
      glitchtip_migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@glitchtip_db:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      # Same SMTP config as the web service — worker sends mail too.
      # Kept as literal duplicate (YAML anchors are not portable across all
      # docker-compose versions we target).
      EMAIL_URL: 'smtp{{ "s" if smtp.tls_mode == "tls" else "" }}://{{ smtp.username | urlencode }}:{{ smtp.password | urlencode }}@{{ smtp.host }}:{{ smtp.port }}{% if smtp.tls_mode == "starttls" %}?tls=True{% endif %}'

  glitchtip_db:
    image: postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: glitchtip
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d glitchtip"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:latest

volumes:
  db_data:
