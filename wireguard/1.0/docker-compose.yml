version: "3"

# ============================================================================
# L4 (Tier-C) reference greffon for the l4-network-exposure epic.
# Deploy-verified 2026-06 on a proxy-mode greffer. Resolution of the three
# draft open items:
#   1. Web-UI auth across wg-easy majors (why :15 is the only viable pin):
#      - v13: accepts plaintext PASSWORD but has no advertise/listen port
#        split (WG_PORT is both), so client configs can never point at the
#        greffer-allocated public port. Broken datapath.
#      - v14: has the split (WG_CONFIG_PORT) but HARD REJECTS plaintext
#        PASSWORD (crash loop) and only takes a bcrypt PASSWORD_HASH, which
#        the platform's config model can't generate. Running it password-less
#        is NOT acceptable: the per-instance greffer nginx is TLS-only (no
#        auth gate — the platform auth_request gate lives at the manager edge
#        proxy), so in proxy mode the UI port is directly reachable.
#      - v15: INIT_USERNAME/INIT_PASSWORD create the admin account from a
#        plaintext value at FIRST BOOT only (then persisted in the app DB and
#        the env is ignored). Auth + config-friendly password.
#   2. Advertised vs listen UDP port: v15 dropped v14's WG_CONFIG_PORT split,
#      so INIT_PORT sets BOTH the client-config endpoint AND the wg device
#      listen port (deploy-verified: wg0 listens on INIT_PORT). RESOLVED by
#      `same_port: true` on the wg-easy_51820 ports[] entry (greffer >= 0.3.0,
#      enforced via min_greffer_version): the greffer publishes the allocated
#      host port on BOTH sides (host P -> container P) and keeps it sticky
#      across restarts, so INIT_PORT (= {{ instance_l4_port }} = P) is at once
#      the advertised endpoint, the in-container listen port, and the published
#      container port. No manual step, and the endpoint survives restarts.
#      Datapath previously verified with a live WireGuard client: Noise
#      handshake + bidirectional traffic through the published UDP port.
#   3. Caps: NET_ADMIN alone is NOT enough — wg-quick's iptables step needs
#      NET_RAW too ("can't initialize iptables table `nat': Permission
#      denied"). Verified posture: cap_drop ALL + NET_ADMIN + NET_RAW +
#      /dev/net/tun. Kernel >= 5.6 in-tree WireGuard confirmed working
#      (no SYS_MODULE).
#
# SECURITY — UNMET ISOLATION REQUIREMENT (do not treat as production-hardened):
#   A WireGuard greffon is a decrypt-and-forward L3 engine — a connected peer is
#   inside the overlay, and wg-easy MASQUERADEs peer traffic out the container's
#   interface. The epic (docs/features/l4-network-exposure/epic.md, the
#   "WireGuard peer pivots into greffer docker network / adjacent tenants" risk
#   row) makes network-namespace isolation + egress firewalling a v1 requirement
#   with a dedicated isolation AC: a peer must not be able to reach the greffer
#   host, its docker networks, or other tenants — only the public internet.
#   That policy CANNOT be expressed in this compose (a VPN needs egress, so
#   `internal: true` is wrong, and the greffer auto-injects a plain bridge with
#   no egress rules). It is greffer-side/host work and is NOT yet implemented.
#   Until it lands, run this only on a single-tenant greffer whose host network
#   you are willing to expose to connected peers. Tracked as a follow-up.
# ============================================================================
#
# Mixed-tier entry:
#   - 51821 (web UI)  -> Tier A: greffer nginx fronts it (peer management + the
#     smoke-test target). Reachable at {{ instance_url }}.
#   - 51820/udp (WG)  -> Tier C (L4): published directly on the greffer host;
#     clients dial {{ instance_l4_host }}:{{ instance_l4_port }}.

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15   # pinned: INIT_* first-boot auth + endpoint/listen split (see notes 1+2)
    restart: unless-stopped
    # Minimized cap posture for a WG server: NET_ADMIN for the TUN interface
    # and routes, NET_RAW for wg-quick's iptables rules (verified required).
    # Drop everything else; no privileged, no host network.
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - "/dev/net/tun:/dev/net/tun"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      # Web-UI port (Tier A; the per-instance greffer nginx TLS-fronts it).
      PORT: "51821"
      # The UI itself listens on plain HTTP behind that TLS proxy.
      INSECURE: "true"
      # Compose networks here are IPv4-only; skip the ip6tables hooks.
      DISABLE_IPV6: "true"
      # First-boot initialization (applied once, then persisted in the app
      # DB on the volume; the env is ignored afterwards). INIT_PASSWORD is
      # filled at deploy from the metadata `configurations` destination.
      INIT_ENABLED: "true"
      INIT_USERNAME: "admin"
      INIT_PASSWORD: ""
      # Public endpoint written into client configs — from the greffer L4
      # endpoint vars (#52). v15 also applies INIT_PORT to the wg device
      # listen port, which is exactly right under same_port: the greffer
      # publishes host P -> container P with P = {{ instance_l4_port }},
      # so advertise == listen == published, sticky across restarts
      # (see note 2 above).
      INIT_HOST: "{{ instance_l4_host }}"
      INIT_PORT: "{{ instance_l4_port }}"
    ports:
      - "51821:51821"        # web UI (Tier A)
      # WireGuard tunnel (Tier C / L4). The declared 51820 anchors the port
      # NAME (wg-easy_51820) at import; with same_port the greffer rewrites
      # the published mapping to host P -> container P at render time.
      - "51820:51820/udp"
    volumes:
      - wg_easy_config:/etc/wireguard

volumes:
  wg_easy_config:
