name: Publish Remotion Studio image

# The greffer only pulls images, it never builds. Remotion has no upstream
# Studio image, so we publish our own to GHCR whenever the image sources change.
on:
  push:
    branches: [main]
    paths:
      - "remotion/1.0/image/**"
      - ".github/workflows/publish-remotion-image.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: remotion/1.0/image
          # amd64 for production greffers; arm64 for local dev on Apple Silicon.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/greffon/remotion-studio:1.0
