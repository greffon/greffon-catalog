name: Validate Greffon Catalog

on:
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Static Validation ──────────────────────────────────────────
  validate:
    name: Static Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run linter regression tests
        # Proves every check in validate_catalog.py would have caught a real bug
        # we shipped. Add a new test alongside any new check.
        run: python .github/scripts/tests_validate_catalog.py

      - name: Detect changed greffons
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^[^.][^/]+/[^/]+/(metadata\.json|docker-compose\.yml|smoke_test\.(json|spec\.ts))$' \
            | sed 's|/[^/]*$||' \
            | sort -u || true)
          echo "changed_dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No greffon files changed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed greffons:"
            echo "$CHANGED"
          fi

      - name: Validate all greffons
        run: python .github/scripts/validate_catalog.py --all

      - name: Validate changed greffons (strict)
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          echo "${{ steps.detect.outputs.changed_dirs }}" | while IFS= read -r dir; do
            [ -n "$dir" ] && python .github/scripts/validate_catalog.py --dir "$dir"
          done

    outputs:
      changed_dirs: ${{ steps.detect.outputs.changed_dirs }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

  # ─── Job 2: Integration Test ───────────────────────────────────────────
  integration:
    name: Integration Test
    needs: validate
    if: needs.validate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout parent greffon repo with all submodules
      - name: Checkout parent greffon repo
        uses: actions/checkout@v4
        with:
          repository: greffon/greffon
          submodules: recursive
          path: greffon

      # 2. Replace catalog submodule with PR code
      - name: Checkout PR catalog code
        uses: actions/checkout@v4
        with:
          path: greffon/greffon-catalog

      # 3. Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. Install manager dependencies
      - name: Install Poetry
        run: pip install poetry

      - name: Install manager dependencies
        working-directory: greffon/manager/backend
        run: poetry install --no-interaction

      # 5. Install test dependencies
      - name: Install test dependencies
        run: pip install requests pyyaml

      # 6. Run integration tests for changed greffons
      - name: Run integration tests
        working-directory: greffon
        env:
          GREFFON_ROOT: ${{ github.workspace }}/greffon
          CHANGED_DIRS: ${{ needs.validate.outputs.changed_dirs }}
        run: |
          python greffon-catalog/.github/scripts/test_greffon.py \
            --changed-dirs "$CHANGED_DIRS"

      # 7. Playwright smoke tests for changed greffons.
      # Each greffon's smoke_test.spec.ts is a real-user happy-path check
      # (login + first action). The test_greffon.py step above must export
      # ${GREFFON}_URL env vars for each deployed instance for these to run.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: greffon/greffon-catalog
        run: |
          npm install --silent
          npx playwright install --with-deps chromium

      - name: Run Playwright smoke specs for changed greffons
        if: env.GREFFON_URLS_SET == 'true'
        working-directory: greffon/greffon-catalog
        env:
          CHANGED_DIRS: ${{ needs.validate.outputs.changed_dirs }}
        run: |
          # Filter changed dirs to those that have a smoke spec, run only those.
          for dir in $CHANGED_DIRS; do
            spec="$dir/smoke_test.spec.ts"
            if [ -f "$spec" ]; then
              npx playwright test "$spec" --workers=1
            fi
          done

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            greffon/greffon-catalog/playwright-report/
            greffon/greffon-catalog/playwright-results/
