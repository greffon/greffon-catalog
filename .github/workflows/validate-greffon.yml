name: Validate Greffon Catalog

on:
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Static Validation ──────────────────────────────────────────
  validate:
    name: Static Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jinja2

      - name: Run linter regression tests
        # Proves every check in validate_catalog.py would have caught a real bug
        # we shipped. Add a new test alongside any new check.
        run: python .github/scripts/tests_validate_catalog.py

      - name: Detect changed greffons
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^[^.][^/]+/[^/]+/(metadata\.json|docker-compose\.yml|smoke_test\.(json|spec\.ts))$' \
            | sed 's|/[^/]*$||' \
            | sort -u || true)
          # Drop directories that no longer exist (delisted/removed greffons):
          # `git diff` still lists their paths, but every downstream consumer
          # (strict validator AND the integration runner) opens files under the
          # dir and fails on a legitimate deletion. Filtering here is the single
          # source of truth so both jobs receive only live entries.
          # `|| true`: under the runner's default `set -eo pipefail`, the loop's
          # last command is the `[ -n ] && [ -d ] && echo` chain, which returns 1
          # when the final candidate is empty (no greffon files changed — e.g. a
          # pure-CI PR) or filtered out (a deleted dir). Without this, the command
          # substitution propagates that 1 and the whole step fails.
          CHANGED=$(echo "$CHANGED" | while IFS= read -r d; do [ -n "$d" ] && [ -d "$d" ] && echo "$d"; done || true)
          echo "changed_dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No greffon files changed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed greffons:"
            echo "$CHANGED"
          fi

      - name: Validate all greffons
        run: python .github/scripts/validate_catalog.py --all

      - name: Validate changed greffons (strict)
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          echo "${{ steps.detect.outputs.changed_dirs }}" | while IFS= read -r dir; do
            # changed_dirs is already filtered to existing dirs in the detect
            # step, so removed greffons never reach here (or the integration job).
            [ -n "$dir" ] && python .github/scripts/validate_catalog.py --dir "$dir"
          done

    outputs:
      changed_dirs: ${{ steps.detect.outputs.changed_dirs }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

  # ─── Job 2: Integration Test (greffer-only) ────────────────────────────
  # Deploys each changed greffon through the PUBLIC greffon/greffer and runs
  # its Playwright smoke spec against the live instance. No manager, no private
  # repos, no PAT — the greffer is the component that does the real render +
  # deploy (where catalog bugs live); the thin manager role (token + cert +
  # /start payload) is reproduced from each entry's metadata.json by the runner.
  integration:
    name: Integration Test
    needs: validate
    if: needs.validate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Kept informational until proven green in CI; flip to a hard gate (drop
    # this line) once the greffer-only harness is confirmed reliable.
    continue-on-error: true

    steps:
      - name: Checkout PR catalog
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: greffon-catalog

      - name: Checkout public greffer
        uses: actions/checkout@v4
        with:
          repository: greffon/greffer
          path: greffer

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install the greffer's runtime deps into the CI python (the runner
      # launches `python -m uvicorn` via sys.executable, so they must live
      # here, not in a separate poetry venv). Pins mirror greffer/pyproject.toml.
      - name: Install greffer + runner deps
        run: |
          pip install \
            "Jinja2>=3.0.3,<4" "requests~=2.26" "urllib3<2" "python-datauri>=1.1.0" \
            "docker~=5.0" "pyyaml>=6.0.1" "fastapi~=0.110" "uvicorn[standard]~=0.29" \
            "pydantic>=2.6,<3" "pydantic-settings>=2.2,<3"

      # The greffer shells out to `docker-compose` (v1, hyphenated). ubuntu-24.04
      # ships only the `docker compose` v2 plugin, so provide a `docker-compose`
      # on PATH (the v2 binary works as a standalone `docker-compose`).
      - name: Ensure docker-compose binary
        run: |
          if ! command -v docker-compose >/dev/null 2>&1; then
            sudo curl -fsSL "https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-$(uname -s)-$(uname -m)" \
              -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi
          docker-compose version

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: greffon-catalog
        run: |
          npm install --silent
          npx playwright install --with-deps chromium

      - name: Deploy + smoke each changed greffon (greffer-only)
        working-directory: greffon-catalog
        env:
          GREFFER_DIR: ${{ github.workspace }}/greffer
          CHANGED_DIRS: ${{ needs.validate.outputs.changed_dirs }}
        run: |
          python .github/scripts/ci_greffer_smoke.py --changed-dirs "$CHANGED_DIRS"

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            greffon-catalog/.playwright/
