name: Validate Greffon Catalog

on:
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Static Validation ──────────────────────────────────────────
  validate:
    name: Static Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # python-datauri: decode render-flagged file defaults with the SAME
        # parser the greffer uses, so validation can't false-accept a data-URI
        # that the greffer would reject at deploy.
        run: pip install pyyaml jinja2 python-datauri

      - name: Run linter regression tests
        # Proves every check in validate_catalog.py would have caught a real bug
        # we shipped. Add a new test alongside any new check.
        run: python .github/scripts/tests_validate_catalog.py

      - name: Detect changed greffons
        id: detect
        run: |
          # Also match files under a greffon's image/ dir (self-built images,
          # e.g. remotion): a Dockerfile/source change must re-smoke the greffon
          # so the candidate image is exercised before merge. The sed collapses
          # any matched path to its <name>/<version> root (image/ files sit one
          # level deeper than metadata.json, so strip to the first two
          # components rather than just the filename).
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^[^.][^/]+/[^/]+/(metadata\.json|docker-compose\.yml|smoke_test\.(json|spec\.ts)|image/.+)$' \
            | sed -E 's|^([^/]+/[^/]+)/.*|\1|' \
            | sort -u || true)
          # Drop directories that no longer exist (delisted/removed greffons):
          # `git diff` still lists their paths, but every downstream consumer
          # (strict validator AND the integration runner) opens files under the
          # dir and fails on a legitimate deletion. Filtering here is the single
          # source of truth so both jobs receive only live entries.
          # `|| true`: under the runner's default `set -eo pipefail`, the loop's
          # last command is the `[ -n ] && [ -d ] && echo` chain, which returns 1
          # when the final candidate is empty (no greffon files changed — e.g. a
          # pure-CI PR) or filtered out (a deleted dir). Without this, the command
          # substitution propagates that 1 and the whole step fails.
          CHANGED=$(echo "$CHANGED" | while IFS= read -r d; do [ -n "$d" ] && [ -d "$d" ] && echo "$d"; done || true)
          echo "changed_dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No greffon files changed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed greffons:"
            echo "$CHANGED"
          fi

      - name: Validate all greffons
        run: python .github/scripts/validate_catalog.py --all

      - name: Validate changed greffons (strict)
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          echo "${{ steps.detect.outputs.changed_dirs }}" | while IFS= read -r dir; do
            # changed_dirs is already filtered to existing dirs in the detect
            # step, so removed greffons never reach here (or the integration job).
            [ -n "$dir" ] && python .github/scripts/validate_catalog.py --dir "$dir"
          done

    outputs:
      changed_dirs: ${{ steps.detect.outputs.changed_dirs }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

  # ─── Job 2: Integration Test (greffer-only) ────────────────────────────
  # Deploys each changed greffon through the PUBLIC greffon/greffer and runs
  # its Playwright smoke spec against the live instance. No manager, no private
  # repos, no PAT — the greffer is the component that does the real render +
  # deploy (where catalog bugs live); the thin manager role (token + cert +
  # /start payload) is reproduced from each entry's metadata.json by the runner.
  integration:
    name: Integration Test
    needs: validate
    if: needs.validate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    # Generous timeout: heavy entries (large images, multi-service stacks like
    # Immich/Multica) must pull + boot within this. Bump if a legitimate greffon
    # needs more rather than weakening the gate.
    timeout-minutes: 45
    # Hard gate: proven end-to-end in CI on a static app (Excalidraw) and a
    # stateful/volume app (Memos). A failing smoke now blocks merge.

    steps:
      - name: Checkout PR catalog
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: greffon-catalog

      - name: Checkout public greffer
        uses: actions/checkout@v4
        with:
          repository: greffon/greffer
          path: greffer

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install the greffer's runtime deps via its OWN poetry lock. Manual pins
      # are fragile here: docker SDK 5.x speaks the `http+docker://` scheme that
      # urllib3 v2 rejects, and a loose `requests`/`urllib3` resolution pulls
      # urllib3 v2 (-> "Not supported URL scheme http+docker" at greffer boot).
      # poetry resolves the exact, known-good set. The runner then runs under
      # this env (`poetry run`), so its uvicorn subprocess (sys.executable)
      # inherits the same interpreter + deps.
      - name: Install greffer deps (poetry)
        working-directory: greffer
        run: |
          pip install poetry
          poetry install --no-interaction

      # The greffer shells out to `docker-compose` (v1, hyphenated). ubuntu-24.04
      # ships only the `docker compose` v2 plugin, so provide a `docker-compose`
      # on PATH (the v2 binary works as a standalone `docker-compose`).
      - name: Ensure docker-compose binary
        run: |
          if ! command -v docker-compose >/dev/null 2>&1; then
            sudo curl -fsSL "https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-$(uname -s)-$(uname -m)" \
              -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi
          docker-compose version

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: greffon-catalog
        run: |
          npm install --silent
          npx playwright install --with-deps chromium

      # Self-built images (a greffon shipping an image/Dockerfile, e.g.
      # remotion) are only published to GHCR on push to main, so the tag the
      # compose references does not exist during a PR. Build it locally and tag
      # it as the compose's image: ref, so the greffer's `docker-compose up`
      # finds it on the runner's daemon and never pulls. This makes PR CI smoke
      # the candidate image instead of a stale/absent registry tag. No-op for
      # greffons that reference an upstream public image.
      - name: Build self-built greffon images
        if: needs.validate.outputs.has_changes == 'true'
        working-directory: greffon-catalog
        env:
          CHANGED_DIRS: ${{ needs.validate.outputs.changed_dirs }}
        run: |
          echo "$CHANGED_DIRS" | while IFS= read -r dir; do
            [ -n "$dir" ] || continue
            [ -f "$dir/image/Dockerfile" ] || continue
            compose="$dir/docker-compose.yml"
            # Every image: line pointing at our own registry is a candidate
            # built from this dir's image/ context.
            grep -E '^[[:space:]]*image:[[:space:]]*ghcr\.io/greffon/' "$compose" \
              | sed -E 's|^[[:space:]]*image:[[:space:]]*||' \
              | while IFS= read -r tag; do
                  echo "Building $tag from $dir/image"
                  docker build -t "$tag" "$dir/image"
                done
          done

      - name: Deploy + smoke each changed greffon (greffer-only)
        working-directory: greffer
        env:
          GREFFER_DIR: ${{ github.workspace }}/greffer
          CHANGED_DIRS: ${{ needs.validate.outputs.changed_dirs }}
        run: |
          # Run under the greffer's poetry env so uvicorn + docker SDK (with the
          # correct urllib3<2) are on the interpreter the runner launches.
          poetry run python "$GITHUB_WORKSPACE/greffon-catalog/.github/scripts/ci_greffer_smoke.py" \
            --changed-dirs "$CHANGED_DIRS"

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            greffon-catalog/.playwright/
